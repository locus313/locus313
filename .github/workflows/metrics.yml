name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 3am UTC
  workflow_dispatch:        # Allow manual runs

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: gh-metrics/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/stats.svg
          base: "header, repositories, commits, contributions"

      - name: Generate top languages card
        uses: gh-metrics/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/top-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8

      - name: Generate achievements card
        uses: gh-metrics/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update README cards" || exit 0
          git pull --rebase
          git push
